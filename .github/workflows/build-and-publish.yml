name: Release

on:
  push:
    tags:
      - 'v*.*.*'  # Run workflow on version tags like v1.0.0

jobs:
  build:
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        include:
          - target: x86_64-unknown-linux-gnu
            os: ubuntu-latest
          - target: x86_64-apple-darwin
            os: macos-latest

    name: Build for ${{ matrix.target }}
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install Rust
        uses: actions-rs/toolchain@v1
        with:
          toolchain: stable
          override: true
          target: ${{ matrix.target }}

      - name: Build release binary
        run: |
          if [[ "${{ matrix.os }}" == "ubuntu-latest" ]]; then
            cargo build --release --target ${{ matrix.target }}
            BIN_PATH=target/${{ matrix.target }}/release
          else
            cargo build --release
            BIN_PATH=target/release
          fi

          BIN_NAME=$(basename $(pwd))
          mkdir -p dist
          cp $BIN_PATH/$BIN_NAME dist/${BIN_NAME}-${{ matrix.target }}

      - name: Package and checksum
        run: |
